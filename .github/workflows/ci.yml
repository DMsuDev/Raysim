# =============================================================================
# CI Build - Compile and validate on every push / PR
# =============================================================================
name: CI Build

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  # ─── Windows MSVC ──────────────────────────────────────────────────────
  build-windows:
    name: Windows (MSVC ${{ matrix.config }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            build/_deps
            vendor
          key: deps-win-${{ hashFiles('vendor/CMakeLists.txt') }}
          restore-keys: deps-win-

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel $env:NUMBER_OF_PROCESSORS

      - name: Test Example - Mouse Detection (Release only)
        if: matrix.config == 'Release' && success()
        shell: pwsh
        run: |
          $exePath = "build\examples\${{ matrix.config }}\Mouse_detection_2D.exe"
          Write-Host "Testing example: $exePath"
          if (Test-Path $exePath) {
            Write-Host "✓ Executable found"
            # Run with 2 second timeout (just to verify it starts without crashing)
            $proc = Start-Process -FilePath $exePath -NoNewWindow -PassThru
            Start-Sleep -Seconds 2
            if ($proc.HasExited) {
              Write-Host "✗ Process exited unexpectedly"
              exit 1
            } else {
              Write-Host "✓ Process started successfully"
              Stop-Process -InputObject $proc -Force
            }
          } else {
            Write-Host "✗ Executable not found at $exePath"
            exit 1
          }

      - name: Upload build artifact
        if: matrix.config == 'Release' && success()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-windows-${{ github.sha }}
          path: build/bin/Release/
          retention-days: 7

  # ─── Linux GCC / Clang (cross-platform validation) ─────────────────────
  build-linux:
    name: Linux (${{ matrix.compiler }}, ${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        config: [Debug, Release]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y cmake clang build-essential \
            libasound2-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev \
            xvfb

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            build/_deps
            vendor
          key: deps-linux-${{ matrix.compiler }}-${{ hashFiles('vendor/CMakeLists.txt') }}
          restore-keys: deps-linux-${{ matrix.compiler }}-

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel $(nproc)

      - name: Test Example - Mouse Detection (Release only)
        if: matrix.config == 'Release' && success()
        run: |
          EXE_PATH="build/examples/Mouse_detection_2D"
          echo "Testing example: $EXE_PATH"
          if [ -f "$EXE_PATH" ]; then
            echo "✓ Executable found"
            # Run with xvfb and 3 second timeout (just to verify it starts without crashing)
            timeout 3s xvfb-run -a "$EXE_PATH" 2>&1 || true
            echo "✓ Process completed"
          else
            echo "✗ Executable not found at $EXE_PATH"
            exit 1
          fi

  # ─── Build summary ─────────────────────────────────────────────────────
  build-status:
    name: CI Status
    needs: [build-windows, build-linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.build-windows.result }}" "${{ needs.build-linux.result }}")
          failed=false
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              failed=true
            fi
          done
          if $failed; then
            echo "::error::One or more build configurations failed"
            exit 1
          fi
          echo "All builds passed!"
