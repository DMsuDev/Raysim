# =============================================================================
# CI - Cross-platform (Windows + Linux) with vcpkg
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: debug
            build_preset: debug

          - os: ubuntu-latest
            preset: release
            build_preset: release

          - os: windows-latest
            preset: msvc-debug
            build_preset: msvc-debug

          - os: windows-latest
            preset: msvc-release
            build_preset: msvc-release

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install CMake & Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libwayland-dev \
            libxkbcommon-dev pkg-config

      - name: Install CMake & Ninja (Windows)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'

      - name: Cache build directory
        uses: actions/cache@v5
        with:
          path: build
          key: build-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('vcpkg.json', '**/CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            build-${{ runner.os }}-${{ matrix.preset }}-

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.preset }}
          buildPreset: ${{ matrix.build_preset }}
