# =============================================================================
# Code Quality - Formatting, linting, and static analysis checks
# =============================================================================
name: Code Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── clang-tidy analysis ───────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y cmake clang build-essential \
            libasound2-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            vendor
          key: tidy-deps-${{ hashFiles('vendor/CMakeLists.txt') }}
          restore-keys: tidy-deps-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          find include examples -name '*.cpp' | while read file; do
            echo "::group::Analyzing $file"
            clang-tidy-18 -p build "$file" --warnings-as-errors='*' 2>&1 || true
            echo "::endgroup::"
          done

  # ─── Codespell (typo detection) ────────────────────────────────────────
  codespell:
    name: Spell Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: build,_deps,vendor/glad,*.lock,*.json,.git
          ignore_words_list: nd,ot,te
          check_filenames: true

  # ─── cppcheck (extra static analysis) ─────────────────────────────────
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++17 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --inline-suppr \
            --error-exitcode=1 \
            --template='{file}:{line}: {severity} ({id}): {message}' \
            -I include \
            include/ examples/ \
            2>&1 | tee cppcheck-report.txt

      - name: Upload cppcheck report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cppcheck-report
          path: cppcheck-report.txt

  # ─── Summary gate ─────────────────────────────────────────────────────
  quality-status:
    name: Quality Gate
    needs: [clang-tidy, codespell, cppcheck]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.clang-tidy.result }}" "${{ needs.codespell.result }}" "${{ needs.cppcheck.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              echo "::error::One or more quality checks failed"
              exit 1
            fi
          done
          echo "All quality checks passed!"
