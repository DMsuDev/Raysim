# =============================================================================
# Release - Build and publish release artifacts on tag push
# =============================================================================
name: Release

on:
  push:
    tags:
      - v*.*.* # Trigger on semantic version tags: v0.1.0, v1.2.3, etc.

permissions:
  contents: write # Needed to create GitHub releases and upload assets

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: RaySim-Windows
            ext: .exe
          - os: ubuntu-latest
            artifact_name: RaySim-Linux
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install -y cmake clang build-essential \
              libasound2-dev libx11-dev libxrandr-dev \
              libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
              libxinerama-dev libwayland-dev libxkbcommon-dev libspdlog-dev

      - name: Configure CMake
        run: |
          cmake -B build ${{ runner.os == 'Windows' && '-G "Visual Studio 17 2022"' || '' }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DWARNINGS_AS_ERRORS=ON
          # Optional: For VS 2026 preview → runs-on: windows-2025-vs2026 + -G "Visual Studio 18 2026"

      - name: Build
        run: cmake --build build --config Release --parallel ${{ runner.os == 'Windows' && '$env:NUMBER_OF_PROCESSORS' || '$(nproc)' }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p release
          cp build/bin/Release/RaySim.exe release/ || cp build/bin/RaySim.exe release/ || true
          cp -r assets release/ 2>$null || true
          Compress-Archive -Path release/* -DestinationPath ${{ matrix.artifact_name }}-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp build/bin/RaySim release/ || cp build/bin/Release/RaySim release/ || true
          cp -r assets release/ 2>/dev/null || true
          tar czf ${{ matrix.artifact_name }}-${{ github.ref_name }}.tar.gz -C release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            *.zip
            *.tar.gz
          retention-days: 30

  # ─── Create GitHub Release ─────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
