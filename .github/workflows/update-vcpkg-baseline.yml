name: Update vcpkg baseline

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update-baseline:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest vcpkg baseline
        id: vcpkg
        run: |
          echo "baseline=$(git ls-remote https://github.com/microsoft/vcpkg.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Read current baseline
        id: current
        run: |
          BASELINE=$(jq -r '.["builtin-baseline"]' vcpkg.json)
          echo "current=$BASELINE" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.vcpkg.outputs.baseline }}" = "${{ steps.current.outputs.current }}" ]; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update baseline
        if: steps.check.outputs.update_needed == 'true'
        run: |
          jq --arg baseline "${{ steps.vcpkg.outputs.baseline }}" \
            '.["builtin-baseline"] = $baseline' vcpkg.json > tmp.json && mv tmp.json vcpkg.json

      - name: Create PR
        if: steps.check.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(vcpkg): update baseline"
          title: "chore(vcpkg): update baseline"
          body: |
            Updated vcpkg builtin-baseline.

            New baseline:
            `${{ steps.vcpkg.outputs.baseline }}`
          branch: chore/update-vcpkg-baseline
          delete-branch: true
