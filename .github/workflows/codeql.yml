name: "CodeQL"

on:
  workflow_dispatch:
  pull_request:
    branches: ['*']
  release:
    types: [published]

env:
  BUILD_TYPE: Release

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies

        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang clang-tidy build-essential \
            libasound2-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev libspdlog-dev

      - name: Cache CMake build
        uses: actions/cache@v5
        with:
          path: build
          key: tidy-build-${{ hashFiles('vendor/CMakeLists.txt', 'CMakeLists.txt') }}
          restore-keys: tidy-build-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          find include examples -name '*.cpp' -print0 | \
            xargs -0 -P$(nproc) -I{} clang-tidy -p build "{}" --warnings-as-errors='*' 2>&1 || true

  codespell:
    name: Spell Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: build,_deps,vendor/glad,*.lock,*.json,.git
          ignore_words_list: nd,ot,te
          check_filenames: true

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            -j$(nproc) \
            --enable=warning,style,performance,portability \
            --std=c++17 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --inline-suppr \
            --error-exitcode=1 \
            --template='{file}:{line}: {severity} ({id}): {message}' \
            -I include \
            include/ examples/ \
            2>&1 | tee cppcheck-report.txt

      - name: Upload cppcheck report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cppcheck-report
          path: cppcheck-report.txt

  quality-status:
    name: Quality Gate
    needs: [clang-tidy, codespell, cppcheck]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.clang-tidy.result }}" "${{ needs.codespell.result }}" "${{ needs.cppcheck.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" ]]; then
              echo "::error::One or more quality checks failed"
              exit 1
            fi
          done
          echo "All quality checks passed!"
