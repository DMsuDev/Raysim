# =============================================================================
# CodeQL - Security & vulnerability analysis for C/C++
# https://codeql.github.com/
# =============================================================================
name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC (even without commits)
    - cron: 0 6 * * 1

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: windows-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            vendor
          key: codeql-deps-${{ hashFiles('vendor/CMakeLists.txt') }}
          restore-keys: codeql-deps-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Focus on security and correctness queries
          queries: +security-extended,security-and-quality
          # Only analyze project code, not vendor
          config: |
            paths:
              - include
              - examples
              - src
            paths-ignore:
              - vendor
              - build
              - _deps

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release

      - name: Build for CodeQL
        run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
          # Upload results even if analysis finds issues
          upload: always
